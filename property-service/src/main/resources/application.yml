spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/geointelli
    username: postgres
    password: 123
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    defer-datasource-initialization: true  
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.spatial.dialect.postgis.PostgisPG95Dialect
        
  sql:
    init:
      mode: never #always

server:
  port: 8081